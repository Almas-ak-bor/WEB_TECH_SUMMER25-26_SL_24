<!DOCTYPE html>
<html>

<head>
    <title>My Website</title>
</head>

<body>
    <h1>My First Web Page</h1>
    <p>My First Paragraph for webpage</p>
    <p id="demo"></p>
    <p>My Second Paragraph for webpage</p>
    <p id="demo1"></p>
</body>
<script>
    var para1 = document.getElementById("demo");
    para1.innerHTML = "Hello Everyone!";

    document.getElementById("demo1").innerHTML = "Hello JavaScript!";  
    document.write("How are you doing?"); 

    alert("Welcome to my website!");

    console.log("This is a message in the console.");

</script>

<style>
    body {
        background-color: lightblue;
        font-family: Arial, sans-serif;
        text-align: center;
        color: rgb(12, 12, 12);

        p {
        color: rgb(213, 15, 15);
    }
    } 
</style>  
<form>
    <center><h2>Age Verification Form</h2>
    <table>
        <tr>
            <td>Enter your age:</td>
            <td><input type="number" name="age"></td>
        </tr>
    </table>
    </center>
</form>

<script>
    document.querySelector('form').addEventListener('submit', function(event) {
        event.preventDefault();
        var age = document.querySelector('input[name="age"]').value;
        if (age < 18) 
        {
            alert("You are a minor.");
        } 
        else if (age >= 18 && age < 25) 
        {
            alert("You are an adult.");
        } 
        else if (age >= 25 && age < 40) 
        {
            alert("You are a young adult.");
        } 
        else if (age >= 40 && age < 60)
        {
            alert("You are a middle-aged adult.");
        } 
        else if (age > 60)
        {
            alert("You are a senior citizen.");
        }
        else 
        {
            alert("You are an adult.");
        }
    });
</script>

</html>
