<!DOCTYPE html>
<html>

<head>
    <title>Intership Opportunities for final year students</title>
</head>
<body>
    <center>
        <h1>Internship Opportunities for Final Year Students</h1
    </center>
 </body>

  <form>
    <table>

        <tr>
            <td>Student Name:</td>
            <td><input type="text" name="first_name"></td> 
        </tr>
        <tr>
            <td>Email Address:</td>
            <td><input type="email" name="email"></td>
        </tr>
        <tr>
            <td>Preferred Internship Type:</td>
            <td><input type="radio" name="internship_type" value="On_Site">On-Site</td>
            <td><input type="radio" name="internship_type" value="Remote">Remote</td>

        </tr>
        <tr>
            <td>Preferred Internship Duration:</td>
            <td>
                <select name ="duration">
                    <option value="6 week"> 6 week</option>
                    <option value="3_months">3 Months</option>
                </select>
            </td>
        </tr>

        <tr>
            <td>Skills of Interest:</td>
        </tr>
        <tr>
            <td><input type="checkbox" name="skills" value="Web Development">Web Development</td>
            <td><input type="checkbox" name="skills" value="Data Analysis">Data Analysis</td>
            <td><input type="checkbox" name="skills" value="Mobile Apps">Mobile Apps</td>
        </tr>
        <tr>
            <td><input type="submit" value="Submit"></td>
        </tr>
    </table>
</form>
</html>
