
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Argentina World Cup 2026</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    height:100vh;
    font-family:Arial, sans-serif;
    position:relative;

    background:
    linear-gradient(
        to bottom,
        #75c9ff 0%,
        #75c9ff 33%,
        white 33%,
        white 66%,
        #75c9ff 66%,
        #75c9ff 100%
    );
}

/* Team Background */
.team-bg{
    position:fixed;
    width:100%;
    height:100%;
    object-fit:cover;
    opacity:.22;
    z-index:-1;
}

.container{
    text-align:center;
    position:relative;
    z-index:5;
    padding-top:20px;
}

h1{
    color:#0086d1;
    font-size:4rem;
    text-shadow:0 0 20px white;
}

h2{
    color:#003b5c;
    margin-bottom:10px;
}

.trophy{
    font-size:90px;
    animation:bounce 2s infinite;
}

.messi{
    width:420px;
    max-width:90%;
    filter:drop-shadow(0 0 20px gold);
    animation:float 3s ease-in-out infinite;
}

.btn{
    margin-top:20px;
    padding:15px 35px;
    border:none;
    border-radius:50px;
    background:#0086d1;
    color:white;
    font-size:20px;
    cursor:pointer;
    box-shadow:0 0 20px #0086d1;
}

.btn:hover{
    transform:scale(1.1);
}

.message{
    display:none;
    margin-top:20px;
    font-size:2rem;
    color:#004e7c;
    font-weight:bold;
    text-shadow:0 0 10px white;
}

.ball{
    position:absolute;
    font-size:45px;
    animation:spin 8s linear infinite;
}

.ball1{top:10%;left:10%;}
.ball2{top:20%;right:10%;}
.ball3{bottom:10%;left:15%;}
.ball4{bottom:15%;right:15%;}

.confetti{
    position:absolute;
    width:12px;
    height:12px;
}

@keyframes bounce{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-15px);}
}

@keyframes float{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-20px);}
}

@keyframes spin{
    from{transform:rotate(0deg);}
    to{transform:rotate(360deg);}
}
</style>
</head>

<body>

<!-- Argentina Team Image -->
<img
class="team-bg"
src="https://images.unsplash.com/photo-1517927033932-b3d18e61fb3a?w=1600"
alt="Argentina Team">

<div class="ball ball1">⚽</div>
<div class="ball ball2">⚽</div>
<div class="ball ball3">⚽</div>
<div class="ball ball4">⚽</div>

<div class="container">

<h1> ARGENTINA </h1>
<h2>FIFA WORLD CUP 2026</h2>

<div class="trophy">🏆</div>

<!-- Messi Image -->
<img
class="messi"
src="https://upload.wikimedia.org/wikipedia/commons/8/89/Portrait_Lionel_Messi.jpg"
alt="Messi">

<br>

<button class="btn" onclick="celebrate()">
🎉 Celebrate Argentina 🎉
</button>

<div class="message" id="message">
🏆 VAMOS ARGENTINA! 🏆<br>
⭐ Messi & Argentina Forever ⭐<br>
⚽ Bring Home the World Cup 2026 ⚽
</div>

</div>

<script>

function celebrate(){

document.getElementById("message").style.display="block";

const colors=[
"#75c9ff",
"#ffffff",
"#ffd700",
"#0086d1"
];

for(let i=0;i<300;i++){

let conf=document.createElement("div");

conf.className="confetti";

conf.style.left=Math.random()*window.innerWidth+"px";
conf.style.top="-20px";

conf.style.background=
colors[Math.floor(Math.random()*colors.length)];

document.body.appendChild(conf);

let x=(Math.random()-0.5)*400;
let y=window.innerHeight+200;

conf.animate(
[
{
transform:"translate(0,0) rotate(0deg)",
opacity:1
},
{
transform:`translate(${x}px,${y}px) rotate(1080deg)`,
opacity:0
}
],
{
duration:4000+Math.random()*2000,
easing:"ease-out"
}
);

setTimeout(()=>{
conf.remove();
},6000);
}

for(let j=0;j<12;j++){
setTimeout(createFirework,j*400);
}
}

function createFirework(){

let x=Math.random()*window.innerWidth;
let y=Math.random()*window.innerHeight*0.6;

for(let i=0;i<50;i++){

let spark=document.createElement("div");

spark.style.position="fixed";
spark.style.left=x+"px";
spark.style.top=y+"px";
spark.style.width="8px";
spark.style.height="8px";
spark.style.borderRadius="50%";

spark.style.background=
["gold","#75c9ff","white","#0086d1"]
[Math.floor(Math.random()*4)];

document.body.appendChild(spark);

let angle=Math.random()*Math.PI*2;
let distance=100+Math.random()*150;

spark.animate(
[
{
transform:"translate(0,0)",
opacity:1
},
{
transform:
`translate(${Math.cos(angle)*distance}px,
${Math.sin(angle)*distance}px)`,
opacity:0
}
],
{
duration:1800,
easing:"ease-out"
}
);

setTimeout(()=>{
spark.remove();
},1800);
}
}

</script>

</body>
</html>
```
